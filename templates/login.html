<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #141e30, #243b55);
}

.box {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 250px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

h2 {
    color: white;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: #00c6ff;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>🔐 Login</h2>

    <form method="post">
        <input name="username" placeholder="Username">
        <input name="password" type="password" placeholder="Password">
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
